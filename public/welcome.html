<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVN Merge Tool - 欢迎</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/welcome.css">
</head>
<body>
  <div class="header">
    <div class="header-content">
      <h1>SVN Merge Tool</h1>
      <div class="header-actions">
        <div id="connectionStatus" class="connection-status disconnected">
          <span class="status-dot"></span>
          <span>未连接</span>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="welcome-intro">
      <h2 class="welcome-intro-title">选择一个工作目录开始</h2>
    </div>

    <!-- 最近使用的工作目录 -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">最近使用</h2>
      </div>
      <div class="card-body">
        <div id="recentWorkspaceList" class="workspace-list">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>

    <!-- 展开查看更多 -->
    <div id="allWorkspacesSection" class="card" style="display: none;">
      <div class="card-header">
        <h2 class="card-title">所有工作目录</h2>
      </div>
      <div class="card-body">
        <div id="allWorkspaceList" class="workspace-list">
          <!-- 动态填充 -->
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="welcome-actions">
      <button id="showAllBtn" class="btn btn-outline">
        <span id="showAllBtnText">查看所有工作目录</span>
      </button>
      <button id="addNewBtn" class="btn btn-primary">
        添加新工作目录
      </button>
    </div>
  </div>

  <!-- 添加工作目录模态框 -->
  <div id="addWorkspaceModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">添加工作目录</h3>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 16px;">
          <label for="workspacePathInput" style="display: block; margin-bottom: 8px; font-weight: 500;">
            工作目录路径
          </label>
          <input
            type="text"
            id="workspacePathInput"
            class="input"
            placeholder="输入 SVN 工作目录路径..."
            style="width: 100%;"
          />
        </div>
        <div style="margin-bottom: 16px;">
          <label for="workspaceNameInput" style="display: block; margin-bottom: 8px; font-weight: 500;">
            名称（可选）
          </label>
          <input
            type="text"
            id="workspaceNameInput"
            class="input"
            placeholder="为工作目录设置一个名称..."
            style="width: 100%;"
          />
        </div>
        <div id="addWorkspaceStatus" style="font-size: 14px; margin-top: 12px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="cancelAddBtn">取消</button>
        <button class="btn btn-primary" id="confirmAddBtn">添加</button>
      </div>
    </div>
  </div>

  <script src="js/components.js"></script>
  <script src="js/websocket-client.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/state-manager.js"></script>
  <script src="js/welcome.js"></script>
</body>
</html>
